services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://decentrarent:decentrarent@db:5432/decentrarent?sslmode=disable
      - JWT_SECRET=decentrarent-dev-jwt-secret-change-in-production
      - CENTRIFUGO_API_KEY=api-secret
      - CENTRIFUGO_URL=http://centrifugo:8000
      - SERVER_PORT=8080
      - MINIO_ENDPOINT=minio:9000
      - MINIO_PUBLIC_ENDPOINT=localhost:9000
      - MINIO_ACCESS_KEY=decentrarent
      - MINIO_SECRET_KEY=decentrarent
      - MINIO_BUCKET=decentrarent-media
      - MINIO_USE_SSL=false
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  centrifugo:
    image: centrifugo/centrifugo:v6.7
    ports:
      - "8000:8000"
    volumes:
      - ./centrifugo/config.json:/centrifugo/config.json
    command: centrifugo -c config.json
    depends_on:
      backend:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=decentrarent
      - POSTGRES_PASSWORD=decentrarent
      - POSTGRES_DB=decentrarent
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decentrarent"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=decentrarent
      - MINIO_ROOT_PASSWORD=decentrarent
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  minio-data:
