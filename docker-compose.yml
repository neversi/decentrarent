services:
  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

  # mobile:
  #   build:
  #     context: ./mobile
  #     dockerfile: Dockerfile
  #   ports:
  #     - "8081:8081"
  #   working_dir: /app
  #   command: npx expo start --lan --non-interactive
  #   environment:
  #     - REACT_NATIVE_PACKAGER_HOSTNAME=10.100.32.91
  #     - EXPO_PUBLIC_API_URL=http://host.docker.internal:8080
  #     - EXPO_PUBLIC_CENTRIFUGO_URL=ws://host.docker.internal:8000/connection/websocket
  #   depends_on:
  #     - backend
  #   volumes:
  #   - ./mobile:/app
  #   - mobile_node_modules:/app/node_modules
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"

  backend:
    container_name: backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://decentrarent:decentrarent@db:5432/decentrarent?sslmode=disable
      - JWT_SECRET=decentrarent-dev-jwt-secret-change-in-production
      - CENTRIFUGO_API_KEY=api-secret
      - CENTRIFUGO_URL=http://centrifugo:8000
      - SERVER_PORT=8080
      - MINIO_ENDPOINT=minio:9000
      - MINIO_PUBLIC_ENDPOINT=localhost:9000
      - MINIO_ACCESS_KEY=decentrarent
      - MINIO_SECRET_KEY=decentrarent
      - MINIO_BUCKET=decentrarent-media
      - MINIO_USE_SSL=false
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  centrifugo:
    container_name: centrifugo
    image: centrifugo/centrifugo:v6.7
    ports:
      - "8000:8000"
    volumes:
      - ./centrifugo/config.json:/centrifugo/config.json
    command: centrifugo -c config.json
    depends_on:
      backend:
        condition: service_healthy

  db:
    container_name: db
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=decentrarent
      - POSTGRES_PASSWORD=decentrarent
      - POSTGRES_DB=decentrarent
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decentrarent"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    container_name: minio
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=decentrarent
      - MINIO_ROOT_PASSWORD=decentrarent
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.8.0
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_BROKER_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      CLUSTER_ID: 'EmptNWtoR4GGWx-BH6nGLQ'
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b kafka:9092 1 20 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-cluster-ui
    ports:
      - "8088:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

volumes:
  pgdata:
  minio-data:
  zookeeper-data:
  kafka-data:
  mobile_node_modules:
