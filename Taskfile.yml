version: '3'

tasks:
  up:
    desc: Start all services
    cmd: docker compose -f docker-compose.dev.yml -f docker-compose.yml up -d

  down:
    desc: Stop all services
    cmd: docker compose down

  logs:
    desc: Tail all service logs
    cmd: docker compose logs -f

  db:reset:
    desc: Reset database (drops volume)
    cmds:
      - docker compose down -v
      - docker compose up -d db

  build:
    desc: Build Anchor program and sync IDL
    dir: blockchain/lease
    cmds:
      - anchor build
      - task: idl:copy

  deploy:
    desc: Deploy to devnet
    dir: blockchain/lease
    cmd: anchor deploy

  upgrade:
    desc: Upgrade existing contract on devnet
    dir: blockchain/lease
    cmds:
      - anchor build
      - anchor upgrade target/deploy/lease.so --program-id GNAZzNcftcRNMtjETiXupfpUqPmwQyhNCrTJeiZFkpWY
      - task: idl:copy

  anchor:test:
    desc: Run Anchor integration tests
    dir: blockchain/lease
    cmd: anchor test

  idl:copy:
    desc: Copy IDL to frontend
    cmds:
      - mkdir -p frontend/src/features/escrow/idl
      - cp blockchain/lease/target/idl/lease.json frontend/src/features/escrow/idl/lease.json

  frontend:dev:
    desc: Start Vite dev server
    dir: frontend
    cmd: npm run dev

  frontend:install:
    desc: Install frontend dependencies
    dir: frontend
    cmd: npm install

  backend:test:
    desc: Run backend Go tests
    dir: backend
    cmd: go test ./... -v

  backend:build:
    desc: Build backend binary
    dir: backend
    cmd: go build ./cmd/server

  backend:docs:
    desc: Generate Go documentation
    dir: backend
    cmd: swag init -g ./main.go -d ./cmd/server,./internal -o ./docs

  backend:migrate:create:
    desc: Create a new SQL migration pair (use NAME=...)
    cmds:
      - mkdir -p backend/migrations
      - migrate create -ext sql -dir backend/migrations -seq {{.NAME}}
    requires:
      vars: [NAME]

  backend:migrate:install:
    desc: Install migrate CLI tool
    cmd: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest

  backend:migrate:up:
    desc: Apply all pending backend SQL migrations
    cmd: migrate -path backend/migrations -database "${DATABASE_URL:-postgres://decentrarent:decentrarent@localhost:5432/decentrarent?sslmode=disable}" up

  backend:migrate:down:
    desc: Roll back backend SQL migrations (use STEPS=1 by default)
    cmd: migrate -path backend/migrations -database "${DATABASE_URL:-postgres://decentrarent:decentrarent@localhost:5432/decentrarent?sslmode=disable}" down ${STEPS:-1}

  backend:migrate:version:
    desc: Show backend migration version
    cmd: migrate -path backend/migrations -database "${DATABASE_URL:-postgres://decentrarent:decentrarent@localhost:5432/decentrarent?sslmode=disable}" version

  backend:migrate:force:
    desc: Force backend migration version (use VERSION=...)
    cmd: migrate -path backend/migrations -database "${DATABASE_URL:-postgres://decentrarent:decentrarent@localhost:5432/decentrarent?sslmode=disable}" force {{.VERSION}}
    requires:
      vars: [VERSION]