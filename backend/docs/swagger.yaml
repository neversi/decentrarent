basePath: /
definitions:
  auth.authResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/user.User'
    type: object
  auth.errorResponse:
    properties:
      error:
        type: string
    type: object
  auth.loginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  auth.nonceResponse:
    properties:
      message:
        type: string
      nonce:
        type: string
    type: object
  auth.signupRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      password:
        type: string
      phone:
        type: string
      username:
        type: string
      wallet_address:
        type: string
    type: object
  auth.verifyRequest:
    properties:
      nonce:
        type: string
      signature:
        type: string
      wallet:
        type: string
    type: object
  chat.Conversation:
    properties:
      created_at:
        type: string
      id:
        type: string
      landlord_id:
        type: string
      last_message:
        type: string
      last_message_at:
        type: string
      loaner_id:
        type: string
      property_id:
        type: string
    type: object
  chat.Message:
    properties:
      content:
        type: string
      conversation_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      message_type:
        type: string
      metadata:
        $ref: '#/definitions/chat.MessageMeta'
      sender_id:
        type: string
    type: object
  chat.MessageMeta:
    properties:
      document_name:
        type: string
      document_url:
        description: Для document
        type: string
      event_type:
        description: Для system
        type: string
      modal_action:
        description: Для modal
        type: string
      modal_id:
        description: unique ID для отслеживания ответа
        type: string
      modal_status:
        description: pending, accepted, rejected
        type: string
      order_id:
        type: string
    type: object
  chat.createConversationRequest:
    properties:
      landlord_id:
        type: string
      property_id:
        type: string
    type: object
  chat.sendDocumentRequest:
    properties:
      content:
        description: описание
        type: string
      conversation_id:
        type: string
      document_name:
        description: имя файла
        type: string
      document_url:
        description: ссылка на файл
        type: string
      order_id:
        description: привязка к ордеру
        type: string
    type: object
  chat.sendMessageRequest:
    properties:
      content:
        type: string
      conversation_id:
        type: string
    type: object
  media.PropertyMedia:
    properties:
      created_at:
        type: string
      file_key:
        type: string
      id:
        type: string
      property_id:
        type: string
      sort_order:
        type: integer
    type: object
  media.RegisterMediaRequest:
    properties:
      file_key:
        type: string
    type: object
  media.ReorderRequest:
    properties:
      order:
        items:
          type: string
        type: array
    type: object
  media.UploadURLRequest:
    properties:
      file_name:
        type: string
    type: object
  media.UploadURLResponse:
    properties:
      file_key:
        type: string
      upload_url:
        type: string
    type: object
  order.CreateOrderRequest:
    properties:
      conversation_id:
        type: string
      deposit_amount:
        type: integer
      escrow_address:
        type: string
      landlord_id:
        type: string
      property_id:
        type: string
      rent_amount:
        type: integer
      rent_end_date:
        type: string
      rent_start_date:
        type: string
      sign_deadline_days:
        type: integer
      token_mint:
        type: string
    type: object
  order.Order:
    properties:
      conversation_id:
        type: string
      created_at:
        type: string
      created_by:
        type: string
      deposit_amount:
        type: integer
      dispute_reason:
        type: string
      escrow_address:
        type: string
      escrow_status:
        type: string
      id:
        type: string
      landlord_id:
        type: string
      landlord_signed:
        type: boolean
      property_id:
        type: string
      rent_amount:
        type: integer
      rent_end_date:
        type: string
      rent_start_date:
        type: string
      sign_deadline:
        type: string
      tenant_id:
        type: string
      tenant_signed:
        type: boolean
      token_mint:
        type: string
      updated_at:
        type: string
    type: object
  order.RentPayment:
    properties:
      amount:
        type: integer
      created_at:
        type: string
      id:
        type: string
      order_id:
        type: string
      paid_by:
        type: string
      period_end:
        type: string
      period_start:
        type: string
      tx_hash:
        type: string
    type: object
  order.StatusHistory:
    properties:
      changed_by:
        type: string
      created_at:
        type: string
      from_status:
        type: string
      id:
        type: string
      order_id:
        type: string
      reason:
        type: string
      to_status:
        type: string
    type: object
  property.CreatePropertyRequest:
    properties:
      description:
        type: string
      location:
        type: string
      period_type:
        type: string
      price:
        type: integer
      title:
        type: string
      token_mint:
        type: string
    type: object
  property.PropertyResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      location:
        type: string
      media:
        items:
          additionalProperties: true
          type: object
        type: array
      owner_wallet:
        type: string
      period_type:
        type: string
      price:
        type: integer
      status:
        type: string
      title:
        type: string
      token_mint:
        type: string
      updated_at:
        type: string
      verification_status:
        type: string
    type: object
  property.StatusRequest:
    properties:
      status:
        type: string
    type: object
  property.UpdatePropertyRequest:
    properties:
      description:
        type: string
      location:
        type: string
      period_type:
        type: string
      price:
        type: integer
      title:
        type: string
      token_mint:
        type: string
    type: object
  user.User:
    properties:
      created_at:
        type: string
      display_name:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
      phone:
        type: string
      username:
        type: string
      wallet_address:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for DecentraRent - Solana dApp for asset renting
  title: DecentraRent API
  version: "1.0"
paths:
  /auth/login:
    post:
      description: User login
      parameters:
      - description: Login request payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.loginRequest'
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.authResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/auth.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/auth.errorResponse'
      summary: User login
      tags:
      - auth
  /auth/nonce:
    get:
      description: Returns a nonce for wallet signature authentication
      parameters:
      - description: Wallet address
        in: query
        name: wallet
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.nonceResponse'
      summary: Get authentication nonce
      tags:
      - auth
  /auth/refresh:
    post:
      description: Returns a new JWT token
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.authResponse'
      security:
      - BearerAuth: []
      summary: Refresh JWT token
      tags:
      - auth
  /auth/signup:
    post:
      description: User signup
      parameters:
      - description: Signup request payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.signupRequest'
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/auth.authResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/auth.errorResponse'
      summary: User signup
      tags:
      - auth
  /auth/verify:
    post:
      consumes:
      - application/json
      description: Verifies wallet signature and returns JWT token
      parameters:
      - description: Verification request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auth.verifyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.authResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Verify wallet signature
      tags:
      - auth
  /conversations:
    get:
      description: Returns all conversations for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/chat.Conversation'
            type: array
      security:
      - BearerAuth: []
      summary: List conversations
      tags:
      - chat
    post:
      consumes:
      - application/json
      description: Creates a new conversation between the authenticated user (loaner)
        and a landlord for a property, or returns the existing one
      parameters:
      - description: Conversation details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/chat.createConversationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/chat.Conversation'
      security:
      - BearerAuth: []
      summary: Create or get a conversation
      tags:
      - chat
  /conversations/{id}/messages:
    get:
      description: 'Returns messages for a conversation with pagination. Supports
        all message types: text, system, document, modal.'
      parameters:
      - description: Conversation ID
        in: path
        name: id
        required: true
        type: string
      - description: Load messages before this timestamp (RFC3339)
        in: query
        name: before
        type: string
      - description: Limit results (default 20, max 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/chat.Message'
            type: array
      security:
      - BearerAuth: []
      summary: Get messages
      tags:
      - chat
  /conversations/documents:
    post:
      consumes:
      - application/json
      description: Sends a document (agreement PDF, etc.) in a conversation
      parameters:
      - description: Document details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/chat.sendDocumentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/chat.Message'
      security:
      - BearerAuth: []
      summary: Send a document in chat
      tags:
      - chat
  /conversations/messages:
    post:
      consumes:
      - application/json
      description: Sends a text message in a conversation
      parameters:
      - description: Message content
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/chat.sendMessageRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/chat.Message'
      security:
      - BearerAuth: []
      summary: Send a text message
      tags:
      - chat
  /orders:
    get:
      description: Returns orders where user is tenant or landlord
      parameters:
      - description: Filter by escrow_status
        in: query
        name: status
        type: string
      - description: Filter by property_id
        in: query
        name: property_id
        type: string
      - description: 'Filter by role: tenant, landlord, or all (default all)'
        in: query
        name: role
        type: string
      - description: Limit (default 20, max 100)
        in: query
        name: limit
        type: integer
      - description: Offset for pagination
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/order.Order'
            type: array
      security:
      - BearerAuth: []
      summary: List orders for the authenticated user
      tags:
      - orders
    post:
      consumes:
      - application/json
      description: Tenant creates a new rental order. Escrow starts in awaiting_signatures
        status.
      parameters:
      - description: Order details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/order.CreateOrderRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/order.Order'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create an order (escrow)
      tags:
      - orders
  /orders/{id}:
    get:
      description: Returns a single order with full details
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/order.Order'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get order by ID
      tags:
      - orders
  /orders/{id}/accept:
    post:
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/order.Order'
      security:
      - BearerAuth: []
      summary: Accept an order proposal
      tags:
      - orders
  /orders/{id}/history:
    get:
      description: Returns the full status transition history
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/order.StatusHistory'
            type: array
      security:
      - BearerAuth: []
      summary: Get status history for an order
      tags:
      - orders
  /orders/{id}/payments:
    get:
      description: Returns all rent payments for the given order
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/order.RentPayment'
            type: array
      security:
      - BearerAuth: []
      summary: Get rent payments for an order
      tags:
      - orders
  /orders/{id}/reject:
    post:
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/order.Order'
      security:
      - BearerAuth: []
      summary: Reject an order proposal
      tags:
      - orders
  /properties:
    get:
      description: Returns a filtered list of properties with media
      parameters:
      - description: Filter by status (listed, unlisted, rented)
        in: query
        name: status
        type: string
      - description: Filter by owner wallet
        in: query
        name: owner
        type: string
      - description: Filter by token mint (SOL, USDC, USDT)
        in: query
        name: token_mint
        type: string
      - description: Filter by period type (hour, day, month)
        in: query
        name: period_type
        type: string
      - description: Limit results (default 20, max 100)
        in: query
        name: limit
        type: integer
      - description: Offset for pagination
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/property.PropertyResponse'
            type: array
      summary: List properties
      tags:
      - properties
    post:
      consumes:
      - application/json
      description: Creates a new property listing for the authenticated user
      parameters:
      - description: Property details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/property.CreatePropertyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/property.PropertyResponse'
      security:
      - BearerAuth: []
      summary: Create a property listing
      tags:
      - properties
  /properties/{id}:
    delete:
      description: Deletes a property and all its media (owner only)
      parameters:
      - description: Property ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a property
      tags:
      - properties
    get:
      description: Returns a single property with media
      parameters:
      - description: Property ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/property.PropertyResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get property by ID
      tags:
      - properties
    put:
      consumes:
      - application/json
      description: Updates property fields (owner only)
      parameters:
      - description: Property ID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/property.UpdatePropertyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/property.PropertyResponse'
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update a property
      tags:
      - properties
  /properties/{id}/media:
    post:
      consumes:
      - application/json
      description: Registers a media file after it has been uploaded to MinIO (owner
        only)
      parameters:
      - description: Property ID
        in: path
        name: id
        required: true
        type: string
      - description: File key from upload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/media.RegisterMediaRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/media.PropertyMedia'
      security:
      - BearerAuth: []
      summary: Register uploaded media
      tags:
      - media
  /properties/{id}/media/{mediaId}:
    delete:
      description: Deletes a media item and its S3 object (owner only)
      parameters:
      - description: Property ID
        in: path
        name: id
        required: true
        type: string
      - description: Media ID
        in: path
        name: mediaId
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Delete media
      tags:
      - media
  /properties/{id}/media/order:
    put:
      consumes:
      - application/json
      description: Updates the sort order of media items (owner only)
      parameters:
      - description: Property ID
        in: path
        name: id
        required: true
        type: string
      - description: Ordered list of media IDs
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/media.ReorderRequest'
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Reorder media
      tags:
      - media
  /properties/{id}/media/upload-url:
    post:
      consumes:
      - application/json
      description: Returns a presigned MinIO URL for direct file upload (owner only)
      parameters:
      - description: Property ID
        in: path
        name: id
        required: true
        type: string
      - description: File name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/media.UploadURLRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/media.UploadURLResponse'
      security:
      - BearerAuth: []
      summary: Get presigned upload URL
      tags:
      - media
  /properties/{id}/status:
    patch:
      consumes:
      - application/json
      description: Updates property status to listed or unlisted (owner only)
      parameters:
      - description: Property ID
        in: path
        name: id
        required: true
        type: string
      - description: New status
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/property.StatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/property.PropertyResponse'
      security:
      - BearerAuth: []
      summary: Change property status
      tags:
      - properties
  /user/me:
    get:
      description: Returns the authenticated user's profile
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/user.User'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - user
securityDefinitions:
  BearerAuth:
    description: Enter "Bearer {token}"
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
